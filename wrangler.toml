name = "podcast-studio"
main = "src/worker.js"
compatibility_date = "2025-06-01"

# Custom domain — Cloudflare provisions the DNS record + managed TLS cert.
routes = [
  { pattern = "podrecorder.net", custom_domain = true },
]
# Keep the *.workers.dev URL alive too (for testing alongside the custom domain).
workers_dev = true

# Static PWA assets (index.html, client.js, transcribe.html, sw.js, icons, _headers)
[assets]
directory = "./public"
binding = "ASSETS"

# One Durable Object instance per room token holds the two peer WebSockets
# and relays signaling between them (replaces the in-memory Map in server.js).
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

# One Device DO per client GUID enforces one active session per device: joining any
# room evicts the device's socket in any other room.
[[durable_objects.bindings]]
name = "DEVICES"
class_name = "Device"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Device"]

# Recording store-and-forward fallback when the P2P data channel can't complete.
# Set a 24h lifecycle rule on the bucket (dashboard or `wrangler r2 bucket lifecycle`).
[[r2_buckets]]
binding = "RECORDINGS"
bucket_name = "podcast-studio-recordings"

# Cloudflare Realtime TURN credentials are minted in /api/turn-credentials.
# Provide these as secrets (never commit):
#   wrangler secret put TURN_TOKEN_ID
#   wrangler secret put TURN_API_TOKEN
# If unset, the endpoint gracefully returns STUN-only ICE servers.

# Clerk (auth + billing). TURN + R2 are gated on a Pro subscription, verified
# server-side by @clerk/backend. Provide as secrets (never commit):
#   wrangler secret put CLERK_SECRET_KEY
#   wrangler secret put CLERK_PUBLISHABLE_KEY   # public, but kept with the pair
# One-time dashboard setup: enable social logins, create the `pro` plan, connect
# Stripe. If CLERK_SECRET_KEY is unset, requirePro() returns null → all rooms are
# free (STUN-only, R2 → 402), so the app degrades to pure P2P.
#
# CI/dev only — a shared secret that flips a room to entitled without a real
# login (see requirePro / test/run.mjs). NEVER set this in production.
#   wrangler secret put TEST_ENTITLE_SECRET      # or set in .dev.vars for `wrangler dev`
#
# AUTH_MODE — 'off' | 'prelaunch' | 'live' (default 'off'):
#   off       — no auth UI; everyone anonymous/free; no payment surface (prod default).
#   prelaunch — sign-in only, NO checkout; being signed in = entitled. Lets you test
#               all gated features (TURN/R2/WS relay) with a login and no payments.
#   live      — sign-in + Go Pro; entitlement requires the paid `pro` plan.
# At launch, flip prelaunch → live (needs prod Clerk pk_live_/sk_live_ + real Stripe).
#   wrangler secret put AUTH_MODE                # value: prelaunch | live  (and in .dev.vars for local)

# ── Staging environment ──────────────────────────────────────────────────────
# A SEPARATE Worker (podcast-studio-staging.<subdomain>.workers.dev) for testing
# over the internet WITHOUT touching production (podrecorder.net) — no custom-domain
# route, its own DO namespace, shares the R2 bucket. `main` + compatibility_date
# inherit from the top level; bindings must be redeclared per environment.
#   Deploy:  wrangler deploy --env staging
#   Secrets: wrangler secret put <NAME> --env staging
[env.staging]
name = "podcast-studio-staging"
workers_dev = true
# Do NOT inherit the top-level custom-domain route — staging must never claim
# podrecorder.net. (Named envs inherit top-level `routes` unless overridden.)
routes = []

[env.staging.assets]
directory = "./public"
binding = "ASSETS"

[[env.staging.durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[env.staging.durable_objects.bindings]]
name = "DEVICES"
class_name = "Device"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[[env.staging.migrations]]
tag = "v2"
new_sqlite_classes = ["Device"]

[[env.staging.r2_buckets]]
binding = "RECORDINGS"
bucket_name = "podcast-studio-recordings"
